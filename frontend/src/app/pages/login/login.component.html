<div class="login-container">

    <div class="card">

        <div class="card-header">

            <h2>Inventory System</h2>

        </div>

        <form (ngSubmit)="login()">

            <div class="form-group">

                <label>Correo</label>

                <input
                    type="email"
                    [(ngModel)]="email"
                    name="email"
                    required>

            </div>

            <div class="form-group">

                <label>Contraseña</label>

                <input
                    type="password"
                    [(ngModel)]="password"
                    name="password"
                    required>

            </div>

            @if(errorMessage){

                <p class="error">

                    {{ errorMessage }}

                </p>

            }

            <button
                type="submit"
                class="btn-primary">

                Iniciar sesión

            </button>

        </form>

    </div>

</div>
